[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"

# Re-verify all Arc Testnet values before deploying:
# Chain ID 5042002 | RPC https://rpc.testnet.arc.network | Explorer https://testnet.arcscan.app
# Native gas token: USDC | Faucet: https://faucet.circle.com
